name: TC-Bot CI/CD

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: 25

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'ecosystem.config.cjs'
      - 'tsconfig*.json'
      - '.env.production'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deployment-check:
    runs-on: ubuntu-latest

    outputs:
      deploy: ${{ steps.decide.outputs.deploy }}

    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if changes require deployment
        id: decide
        shell: bash
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE"^{commit} 2>/dev/null; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files=$(git diff --name-only "$BEFORE" "$AFTER")
          echo "Changed files:"
          echo "$changed_files"

          if [ -z "$changed_files" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Ignore pnpm-lock.yaml for the "other paths" gate (same as Auth).
          others=$(echo "$changed_files" | grep -vE '^(package.json|pnpm-lock.yaml)$' || true)
          if [ -n "$others" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tmp_old=$(mktemp)
          tmp_new=$(mktemp)
          printf '%s' "$(git show "$BEFORE:package.json" 2>/dev/null || echo '{}')" > "$tmp_old"
          printf '%s' "$(git show "$AFTER:package.json" 2>/dev/null || echo '{}')" > "$tmp_new"

          if ! jq -e --slurp \
            '.[0] as $new | .[1] as $old |
             ($new | del(.devDependencies)) == ($old | del(.devDependencies))' \
            "$tmp_new" "$tmp_old" >/dev/null; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "deploy=false" >> "$GITHUB_OUTPUT"

  install-cache:
    runs-on: ubuntu-latest

    needs: deployment-check
    if: needs.deployment-check.outputs.deploy == 'true'

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v5
        id: cache-dependencies
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  type-check:
    runs-on: ubuntu-latest

    needs: [install-cache]

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore dependencies
        uses: actions/cache@v5
        id: cache-dependencies
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm run typecheck

  unit-tests:
    runs-on: ubuntu-latest

    needs: [install-cache]

    env:
      DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore dependencies
        uses: actions/cache@v5
        id: cache-dependencies
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: |
          if [ -z "$DOTENV_PRIVATE_KEY_PRODUCTION" ]; then
            echo "ERROR: DOTENV_PRIVATE_KEY_PRODUCTION secret is missing or empty."
            exit 1
          fi
          pnpm exec dotenvx run --strict -f .env.production -- pnpm run test

  run-lint:
    runs-on: ubuntu-latest

    needs: [install-cache]

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore dependencies
        uses: actions/cache@v5
        id: cache-dependencies
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

  run-check-format:
    runs-on: ubuntu-latest

    needs: [install-cache]

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore dependencies
        uses: actions/cache@v5
        id: cache-dependencies
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run check-format
        run: pnpm run check-format

  build:
    runs-on: ubuntu-latest

    needs: [install-cache, type-check, unit-tests, run-lint, run-check-format]

    env:
      GOOGLE_CLIENT_SECRET_BASE64: ${{ secrets.GOOGLE_CLIENT_SECRET_BASE64 }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_KNOWN_HOST: ${{ secrets.SERVER_KNOWN_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PATH: ${{ secrets.SERVER_PATH }}
      SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
      DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore dependencies
        uses: actions/cache@v5
        id: cache-dependencies
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native modules
        run: pnpm rebuild better-sqlite3 esbuild

      - name: Create client_secret.json from secret
        run: |
          if [ -z "$GOOGLE_CLIENT_SECRET_BASE64" ]; then
            echo "ERROR: GOOGLE_CLIENT_SECRET_BASE64 secret is missing or empty."
            exit 1
          fi
          printf '%s' "$GOOGLE_CLIENT_SECRET_BASE64" | base64 -d > client_secret.json

      - name: Validate dotenv private key
        run: |
          if [ -z "$DOTENV_PRIVATE_KEY_PRODUCTION" ]; then
            echo "ERROR: DOTENV_PRIVATE_KEY_PRODUCTION secret is missing or empty."
            exit 1
          fi

      - name: Build TypeScript
        run: pnpm exec dotenvx run --strict -f .env.production -- pnpm run build

      - name: Deploy slash commands
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$CLIENT_ID" ]; then
            echo "Skipping command deploy: TOKEN or CLIENT_ID secret missing."
            exit 0
          fi
          pnpm exec dotenvx run --strict -f .env.production -- pnpm run deploy

      - name: List built files (debug)
        run: ls -la dist/

      - name: Setup SSH
        run: |
          require_non_empty() {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "ERROR: $name is missing or empty."
              exit 1
            fi
          }

          require_non_empty "SSH_PRIVATE_KEY" "$SSH_PRIVATE_KEY"
          require_non_empty "SERVER_KNOWN_HOST" "$SERVER_KNOWN_HOST"
          require_non_empty "SERVER_HOST" "$SERVER_HOST"
          require_non_empty "SERVER_USER" "$SERVER_USER"
          require_non_empty "SERVER_PATH" "$SERVER_PATH"
          require_non_empty "SERVER_SSH_PORT" "$SERVER_SSH_PORT"

          case "$SERVER_PATH" in
            ""|"/"|"."|".."|"~"|"~/"|"/home"|"/root")
              echo "ERROR: SERVER_PATH has unsafe value: '$SERVER_PATH'"
              exit 1
              ;;
          esac
          case "$SERVER_PATH" in
            "~"*|*".."*|*"/./"*|*"/../"*|*"//"*)
              echo "ERROR: SERVER_PATH contains unsafe path segments: '$SERVER_PATH'"
              exit 1
              ;;
          esac

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SERVER_KNOWN_HOST" >> ~/.ssh/known_hosts

      - name: Prepare deployment
        run: |
          mkdir -p /tmp/deploy
          cp -r dist/ /tmp/deploy/
          cp package*.json /tmp/deploy/
          cp -r node_modules/ /tmp/deploy/
          cp ecosystem.config.cjs /tmp/deploy/
          cp client_secret.json /tmp/deploy/
          cp .env.production /tmp/deploy/
          printf 'DOTENV_PRIVATE_KEY_PRODUCTION=%s\n' "$DOTENV_PRIVATE_KEY_PRODUCTION" > /tmp/deploy/.env.keys
          chmod 600 /tmp/deploy/.env.keys

      - name: Deploy to server
        run: |
          rsync -av --no-times --delete \
            --exclude='.env' \
            --exclude='.env.keys' \
            --exclude='logs/' \
            --exclude='data/' \
            --chmod=D2770,F640 \
            --omit-dir-times \
            -e "ssh -p $SERVER_SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            /tmp/deploy/ \
            "$SERVER_USER@$SERVER_HOST:$SERVER_PATH/"
          rsync -av --no-times \
            --chmod=F600 \
            --omit-dir-times \
            -e "ssh -p $SERVER_SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            /tmp/deploy/.env.keys \
            "$SERVER_USER@$SERVER_HOST:$SERVER_PATH/.env.keys"

      - name: Restart PM2
        run: |
          if [ -z "$SERVER_USER" ] || [ -z "$SERVER_HOST" ] || [ -z "$SERVER_SSH_PORT" ]; then
            echo "ERROR: SERVER_USER, SERVER_HOST, or SERVER_SSH_PORT secret is missing or empty."
            exit 1
          fi
          COMMIT_MSG=$(git log -1 --format='%s' | head -c 100)
          COMMIT_MSG=$(printf '%s' "$COMMIT_MSG" | tr -cd 'a-zA-Z0-9 ._:,/()-')
          ssh -i ~/.ssh/deploy_key \
            -p "$SERVER_SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SERVER_USER@$SERVER_HOST" \
            "DEPLOY_REASON='CI deploy: ${COMMIT_MSG}' /usr/local/bin/pm2-restart-safe TC-Bot"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
