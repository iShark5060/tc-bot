name: Deploy TC-Bot

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package*.json'
      - 'ecosystem.config.cjs'
      - 'tsconfig.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLIENT_SECRET_BASE64: ${{ secrets.GOOGLE_CLIENT_SECRET_BASE64 }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_KNOWN_HOST: ${{ secrets.SERVER_KNOWN_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PATH: ${{ secrets.SERVER_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create client_secret.json from secret
        run: |
          if [ -z "$GOOGLE_CLIENT_SECRET_BASE64" ]; then
            echo "ERROR: GOOGLE_CLIENT_SECRET_BASE64 secret is missing or empty."
            exit 1
          fi
          printf '%s' "$GOOGLE_CLIENT_SECRET_BASE64" | base64 -d > client_secret.json

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Typecheck tests
        run: npm run test:typecheck

      - name: Deploy slash commands
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$CLIENT_ID" ]; then
            echo "Skipping command deploy: TOKEN or CLIENT_ID secret missing."
            exit 0
          fi
          npm run deploy

      - name: List built files (debug)
        run: ls -la dist/

      - name: Setup SSH
        run: |
          require_non_empty() {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "ERROR: $name is missing or empty."
              exit 1
            fi
          }

          require_non_empty "SSH_PRIVATE_KEY" "$SSH_PRIVATE_KEY"
          require_non_empty "SERVER_KNOWN_HOST" "$SERVER_KNOWN_HOST"
          require_non_empty "SERVER_HOST" "$SERVER_HOST"
          require_non_empty "SERVER_USER" "$SERVER_USER"
          require_non_empty "SERVER_PATH" "$SERVER_PATH"

          case "$SERVER_PATH" in
            ""|"/"|"."|".."|"~"|"~/"|"/home"|"/root")
              echo "ERROR: SERVER_PATH has unsafe value: '$SERVER_PATH'"
              exit 1
              ;;
          esac
          case "$SERVER_PATH" in
            "~"*|*".."*|*"/./"*|*"/../"*|*"//"*)
              echo "ERROR: SERVER_PATH contains unsafe path segments: '$SERVER_PATH'"
              exit 1
              ;;
          esac

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SERVER_KNOWN_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          mkdir -p /tmp/deploy
          cp -r dist/ /tmp/deploy/
          cp package*.json /tmp/deploy/
          cp -r node_modules/ /tmp/deploy/
          cp ecosystem.config.cjs /tmp/deploy/
          cp client_secret.json /tmp/deploy/

          rsync -av --delete \
            --exclude='.env' \
            --exclude='logs/' \
            --exclude='data/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            /tmp/deploy/ \
            "$SERVER_USER@$SERVER_HOST:$SERVER_PATH/"

      - name: Restart PM2
        run: |
          if [ -z "$SERVER_USER" ] || [ -z "$SERVER_HOST" ] || [ -z "$SERVER_PATH" ]; then
            echo "ERROR: SERVER_USER, SERVER_HOST, or SERVER_PATH secret is missing or empty."
            exit 1
          fi
          COMMIT_MSG=$(git log -1 --format='%s' | head -c 100)
          COMMIT_MSG=$(printf '%s' "$COMMIT_MSG" | tr -cd 'a-zA-Z0-9 ._:,/()-')
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SERVER_USER@$SERVER_HOST" \
            "cd \"$SERVER_PATH\" && source ~/.nvm/nvm.sh && export DEPLOY_REASON='CI deploy: ${COMMIT_MSG}' && pm2 restart TC-Bot --update-env"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
